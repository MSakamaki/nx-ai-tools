name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - run: npm ci

      # Sets NX_BASE / NX_HEAD so `nx affected` diffs correctly on both
      # pull_request and push-to-main events.
      - uses: nrwl/nx-set-shas@v4

      - run: npx nx affected -t lint test build typecheck

      - name: npm pack --dry-run (ai-metrics)
        run: npm pack --dry-run
        working-directory: packages/ai-metrics

      - name: Build ai-metrics
        run: npx nx build ai-metrics

      - name: CLI smoke test (run built entry directly)
        run: |
          set +e
          OUTPUT=$(node packages/ai-metrics/dist/cli/index.js --help 2>&1)
          set -e
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "Usage: ai-metrics"

      - name: Pack ai-metrics tarball
        run: npm pack --pack-destination "$RUNNER_TEMP"
        working-directory: packages/ai-metrics

      - name: Install tarball into a temp project and run the CLI
        run: |
          set -e
          TARBALL=$(ls "$RUNNER_TEMP"/nx-ai-tools-ai-metrics-*.tgz)
          INSTALL_DIR=$(mktemp -d)
          cd "$INSTALL_DIR"
          npm init -y >/dev/null
          npm install "$TARBALL"
          set +e
          OUTPUT=$(npx --no-install ai-metrics --help 2>&1)
          set -e
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "Usage: ai-metrics"
