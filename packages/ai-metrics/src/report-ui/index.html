<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ai-metrics report</title>
    <link rel="stylesheet" href="styles.css" />
    <!--AI_METRICS_CONFIG-->
  </head>
  <body>
    <header class="app-header">
      <h1>ai-metrics report</h1>
      <p id="report-meta" class="muted"></p>
    </header>

    <nav class="tabs" id="tabs">
      <button type="button" class="tab active" data-view="overview">Overview</button>
      <button type="button" class="tab" data-view="prompts">Prompt View</button>
      <button type="button" class="tab" data-view="commits">Commit View</button>
      <button type="button" class="tab" data-view="provider-model">Provider / Model View</button>
      <button type="button" class="tab" data-view="agent-skill">Agent / Skill View</button>
      <button type="button" class="tab" data-view="raw-events">Raw Events View</button>
    </nav>

    <main id="app">
      <p id="status" class="status">Loading...</p>

      <section id="view-overview" class="view" hidden></section>
      <section id="view-prompts" class="view" hidden></section>
      <section id="view-commits" class="view" hidden></section>
      <section id="view-provider-model" class="view" hidden></section>
      <section id="view-agent-skill" class="view" hidden></section>
      <section id="view-raw-events" class="view" hidden></section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
